<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthSync – Anmelden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #00e5a0;
      --accent2: #00b8ff;
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --error: #f85149;
      --success: #3fb950;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 80% 50%, rgba(0, 229, 160, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 20%, rgba(0, 184, 255, 0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
      text-align: center;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.4rem 2.2rem;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 1.8rem;
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.12);
    }

    .btn-primary {
      width: 100%;
      padding: 0.82rem;
      margin-top: 0.6rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0d1117;
      border: none;
      border-radius: 9px;
      font-size: 0.97rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-primary:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .msg {
      margin-top: 1.1rem;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      display: none;
    }

    .msg.error {
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--error);
      display: block;
    }

    .msg.success {
      background: rgba(63, 185, 80, 0.12);
      border: 1px solid rgba(63, 185, 80, 0.3);
      color: var(--success);
      display: block;
    }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.87rem;
      color: var(--muted);
    }

    .footer-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }

    /* Welcome banner shown after login */
    #welcome {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0;
    }

    #welcome .big {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    #welcome p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(13, 17, 23, 0.4);
      border-top-color: #0d1117;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="logo">HealthSync</div>
  <p class="tagline">Willkommen zurück 👋</p>

  <div class="card">
    <h1>Anmelden</h1>
    <p class="subtitle">Melde dich an, um deine Daten zu sehen.</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">E-Mail-Adresse</label>
        <input type="email" id="email" placeholder="name@beispiel.de" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="Dein Passwort" required autocomplete="current-password" />
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">Anmelden</button>
    </form>

    <div class="msg" id="msg"></div>

    <div id="welcome">
      <div class="big">🏆</div>
      <p id="welcomeText"></p>
    </div>

    <p class="footer-link">
      Noch kein Konto? <a href="register.html">Jetzt registrieren</a>
    </p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    const submitBtn = document.getElementById('submitBtn');

    // If already logged in, show info
    const existingToken = localStorage.getItem('hs_token');
    if (existingToken) {
      try {
        const payload = JSON.parse(atob(existingToken.split('.')[1]));
        msg.textContent = `✅ Du bist bereits als "${payload.username}" angemeldet.`;
        msg.classList.add('success');
      } catch (_) { }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'msg';
      msg.textContent = '';
      document.getElementById('welcome').style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        msg.textContent = 'Bitte alle Felder ausfüllen.';
        msg.classList.add('error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Anmelden…';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (res.ok) {
          // Store JWT and user info in localStorage
          localStorage.setItem('hs_token', data.token);
          localStorage.setItem('hs_user', JSON.stringify(data.user));

          msg.textContent = '✅ Login erfolgreich! Token gespeichert.';
          msg.classList.add('success');
          form.style.display = 'none';

          const welcome = document.getElementById('welcome');
          document.getElementById('welcomeText').textContent =
            `Hallo, ${data.user.username}! Dein JWT wurde im LocalStorage gespeichert.`;
          welcome.style.display = 'block';
        } else {
          msg.textContent = '⚠️ ' + data.error;
          msg.classList.add('error');
        }
      } catch (err) {
        msg.textContent = '❌ Server nicht erreichbar. Läuft der Server?';
        msg.classList.add('error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Anmelden';
      }
    });
  </script>

</body>

</html>
